<html>
  <head>
    <link rel="stylesheet" href="index.css">
    <script defer src="index.js"></script>
  </head>
  <body>
    <h1>People Counter</h1>
    <h2 id="counter">0</h2>
    <div>
      <button id="increment-btn" type="button" onClick="increment()">+</button>
      <button id="decrement-btn" type="button" onClick="decrement()">-</button>
    </div>
    <div>
      <button id="save-btn" type="button" onClick="save()">Save</button>
      <button id="clear-btn" type="button" onClick="clearAll()">Clear All</button>
    </div>
    
    <hr />
    <p id="save"></p>
  </body>

  
</html>
